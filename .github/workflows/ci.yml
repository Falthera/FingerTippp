name: CI - Build & Package

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Fingertippp.App/Fingertippp.App.csproj

      - name: Build
        run: dotnet build src/Fingertippp.App/Fingertippp.App.csproj -c Release --no-restore

      - name: Test
        run: dotnet test src/Fingertippp.Tests/Fingertippp.Tests.csproj -c Release

      - name: Publish single-file EXE (win-x64)
        run: |
          dotnet publish src/Fingertippp.App/Fingertippp.App.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o publish/win-x64

      - name: Upload published EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fingertippp-publish-win-x64
          path: publish/win-x64

      - name: Install WiX Toolset (robust)
        shell: powershell
        run: |
          $packages = @('wix','wixtoolset','wixtoolset3','wix.toolset')
          $installed = $false
          foreach ($p in $packages) {
            Write-Host "Trying choco install $p -y"
            try {
              choco install $p -y -r
              if ($LASTEXITCODE -eq 0) { $installed = $true; break }
            } catch {
              Write-Host "choco install $p failed"
            }
          }
          # verify expected WiX binaries
          $paths = @(
            "$env:ProgramFiles\WiX Toolset v3.11\bin\candle.exe",
            "$env:ProgramFiles\WiX Toolset\bin\candle.exe",
            (Get-Command candle.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -ErrorAction SilentlyContinue)
          ) | Where-Object { $_ }
          if (-not $paths) {
            Write-Host "WiX tools not found after choco attempts. Listing ProgramFiles contents for debugging:"
            Get-ChildItem "$env:ProgramFiles" -Directory | Select-Object -First 50 | ForEach-Object { Write-Host $_.FullName }
            Write-Error "WiX Toolset (candle.exe/light.exe) not available on runner. Please ensure WiX is installed or update the workflow to provide WiX binaries."
            exit 1
          }

      - name: Build MSI installer
        shell: powershell
        run: |
          pwsh -File build\create-installer.ps1 -PublishDir "${{ github.workspace }}\publish\win-x64" -OutputDir "${{ github.workspace }}\artifacts"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fingertippp-msi
          path: artifacts

  build-linux:
    name: Build (Linux tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore src/Fingertippp.Core/Fingertippp.Core.csproj
      - run: dotnet test src/Fingertippp.Tests/Fingertippp.Tests.csproj -c Release
