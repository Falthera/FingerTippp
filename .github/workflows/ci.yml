name: CI - Build & Package

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Fingertippp.App/Fingertippp.App.csproj

      - name: Build
        run: dotnet build src/Fingertippp.App/Fingertippp.App.csproj -c Release --no-restore

      - name: Test
        run: dotnet test src/Fingertippp.Tests/Fingertippp.Tests.csproj -c Release

      - name: Publish single-file EXE (win-x64)
        run: |
          dotnet publish src/Fingertippp.App/Fingertippp.App.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o publish/win-x64

      - name: Upload published EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fingertippp-publish-win-x64
          path: publish/win-x64

      - name: Create tag and push (triggers release)
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          $timestamp = Get-Date -Format 'yyyyMMddHHmmss'
          $tag = "v$timestamp-r${{ github.run_number }}"
          Write-Host "Creating tag $tag"
          git tag -a $tag -m "Release $tag"
          git push origin $tag

      - name: Skip MSI packaging
        run: echo "Skipping MSI packaging; publishing EXE artifact only."

  build-linux:
    name: Build (Linux tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore src/Fingertippp.Core/Fingertippp.Core.csproj
      - run: dotnet test src/Fingertippp.Tests/Fingertippp.Tests.csproj -c Release
