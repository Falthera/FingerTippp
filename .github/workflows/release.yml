name: Release on tag

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build & Publish (win-x64)
        run: |
          dotnet restore src/Fingertippp.App/Fingertippp.App.csproj
          dotnet build src/Fingertippp.App/Fingertippp.App.csproj -c Release
          dotnet publish src/Fingertippp.App/Fingertippp.App.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o publish/win-x64

      - name: Install WiX
        shell: powershell
        run: choco install wix -y

      - name: Build MSI
        shell: powershell
        run: pwsh -File build\create-installer.ps1 -PublishDir "${{ github.workspace }}\publish\win-x64" -OutputDir "${{ github.workspace }}\artifacts"

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE artifact to release
        uses: softprops/action-gh-release@v1
        with:
          files: publish/win-x64/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload MSI artifact to release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
