name: Release on tag

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build & Publish (win-x64)
        run: |
          dotnet restore src/Fingertippp.App/Fingertippp.App.csproj
          dotnet build src/Fingertippp.App/Fingertippp.App.csproj -c Release
          dotnet publish src/Fingertippp.App/Fingertippp.App.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o publish/win-x64

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload published EXE files to release
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $uploadUrl = '${{ steps.create_release.outputs.upload_url }}'
          if (-not $uploadUrl) { Write-Error 'upload_url not found on create_release outputs'; exit 1 }
          # Remove the templated query part like '{?name,label}' if present
          $baseUrl = $uploadUrl -replace '\{\?.*\}$',''
          $files = Get-ChildItem -Path publish\win-x64 -File -ErrorAction SilentlyContinue
          if (-not $files) { Write-Host 'No files found in publish\win-x64 to upload'; exit 0 }
          foreach ($f in $files) {
            $name = [System.Uri]::EscapeDataString($f.Name)
            $uri = "$baseUrl?name=$name"
            Write-Host "Uploading $($f.Name) to $uri"
            $headers = @{ Authorization = "Bearer $env:GITHUB_TOKEN"; Accept = 'application/vnd.github+json' }
            try {
              Invoke-RestMethod -Method Post -Uri $uri -Headers $headers -InFile $f.FullName -ContentType 'application/octet-stream' -ErrorAction Stop
            } catch {
              Write-Error "Failed uploading $($f.Name): $($_.Exception.Message)"
              exit 1
            }
          }
